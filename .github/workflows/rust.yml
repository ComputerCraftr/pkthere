name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  PKTHERE_ALLOW_RAW_ICMP: 1
  PKTHERE_ALLOW_KERNEL_ICMP_ECHO: 1

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Enable ICMP ping sockets
        if: runner.os == 'Linux'
        run: |
          sudo sysctl -w net.ipv4.ping_group_range="0 2147483647"

      - name: Build
        run: cargo test --no-run --verbose

      - name: Grant raw ICMP capability to debug binary (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo setcap cap_net_raw+ep target/debug/pkthere
          getcap target/debug/pkthere

      - name: Grant raw ICMP capability to debug binary (macOS)
        if: runner.os == 'macOS'
        run: |
          sudo chown root target/debug/pkthere
          sudo chmod u+s target/debug/pkthere
          ls -l target/debug/pkthere

      - name: Run tests
        run: cargo test --verbose

  stress-release:
    name: Stress Regression (Release)
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Enable ICMP ping sockets
        if: runner.os == 'Linux'
        run: |
          sudo sysctl -w net.ipv4.ping_group_range="0 2147483647"

      - name: Build release test binaries
        run: cargo test --release --tests --no-run --verbose

      - name: Grant raw ICMP capability to release binary (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo setcap cap_net_raw+ep target/release/pkthere
          getcap target/release/pkthere

      - name: Grant raw ICMP capability to release binary (macOS)
        if: runner.os == 'macOS'
        run: |
          sudo chown root target/release/pkthere
          sudo chmod u+s target/release/pkthere
          ls -l target/release/pkthere

      - name: Run release stress regression tests
        run: cargo test --release stress_test_ipv4_all -- --ignored --nocapture
