name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Enable ICMP ping sockets
        if: runner.os == 'Linux'
        run: |
          sudo sysctl -w net.ipv4.ping_group_range="0 2147483647"

      - name: Build
        run: cargo test --no-run --verbose

      - name: Run tests
        run: cargo test --verbose

  stress-release:
    name: Stress Regression (Release)
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Enable ICMP ping sockets
        if: runner.os == 'Linux'
        run: |
          sudo sysctl -w net.ipv4.ping_group_range="0 2147483647"

      - name: Build release test binaries
        run: cargo test --release --tests --no-run --verbose

      - name: Run release stress regression tests
        run: cargo test --release stress_test_ipv4_all -- --ignored --nocapture
